<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Space Chicken Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="Constants.js" type="module"></script>
    <script src="AudioManager.js" type="module"></script>
    <script src="LevelConfig.js" type="module"></script>
    <script src="UIManager.js" type="module"></script>
    <script src="LeaderboardManager.js" type="module"></script>
    <script src="SpriteFactory.js" type="module"></script>
    <script src="SpaceChicken.js" type="module"></script>
    <style>
        :root {
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-right: env(safe-area-inset-right, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-left: env(safe-area-inset-left, 0px);
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: monospace;
            touch-action: none;
            overscroll-behavior: none;
        }
        #phaser-game {
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="phaser-game"></div>
    <script type="module">
        import { SpaceChicken } from './SpaceChicken.js';

        try {
            const config = {
                type: Phaser.AUTO,
                scale: {
                    mode: Phaser.Scale.RESIZE,
                    autoCenter: Phaser.Scale.CENTER_BOTH,
                },
                parent: 'phaser-game',
                physics: {
                    default: 'arcade',
                    arcade: {
                        gravity: { y: 300 },
                        debug: false
                    }
                },
                scene: [SpaceChicken]
            };

            const game = new Phaser.Game(config);
        } catch (error) {
            console.error('Failed to initialize game:', error);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = 'Failed to load game. Please check console for details.';
            document.body.appendChild(errorDiv);
        }
    </script>
</body>
</html>
